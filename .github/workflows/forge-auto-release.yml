# Windows releases: SmartScreen shows "Unknown publisher" unless the installer is Authenticode-signed.
# Optional signing — add repo secrets (Settings → Secrets → Actions):
#   WINDOWS_CODESIGN_PFX_BASE64 — Base64 content of your .pfx from an OV/EV code-signing CA
#   WINDOWS_CODESIGN_PASSWORD     — PFX password
# Without these, CI still builds an unsigned installer (users click More info → Run anyway).
name: Forge Auto Release

on:
  push:
    branches:
      - main
    paths:
      - "skia-ide/**"
      - ".github/workflows/forge-auto-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: forge-auto-release
  cancel-in-progress: true

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skia-ide/package-lock.json

      - name: Install dependencies
        working-directory: skia-ide
        run: npm ci

      - name: Compute release version
        shell: pwsh
        run: |
          $pkg = Get-Content "skia-ide/package.json" -Raw | ConvertFrom-Json
          $base = [string]$pkg.version
          $parts = $base.Split(".")
          if ($parts.Length -lt 2) {
            throw "package.json version must be semantic (x.y.z)"
          }
          $version = "$($parts[0]).$($parts[1]).${{ github.run_number }}"
          "FORGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "FORGE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Prepare Windows code signing (optional)
        id: codesign
        working-directory: skia-ide
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_B64)) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "signing=false"
            Write-Host "WINDOWS_CODESIGN_PFX_BASE64 not set — installer will be unsigned."
          } else {
            $pfxPath = Join-Path (Get-Location) "codesign.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_B64))
            Add-Content -Path $env:GITHUB_OUTPUT -Value "signing=true"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "pfx_path=$pfxPath"
            Write-Host "Signing certificate ready at $pfxPath"
          }

      - name: Build Windows installer
        working-directory: skia-ide
        shell: pwsh
        env:
          SIGNING: ${{ steps.codesign.outputs.signing }}
          PFX_PATH: ${{ steps.codesign.outputs.pfx_path }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          npm run build
          if ($env:SIGNING -eq "true") {
            $env:CSC_LINK = $env:PFX_PATH
            Write-Host "electron-builder will Authenticode-sign (CSC_LINK set)."
          }
          npx electron-builder --win --publish never --config.extraMetadata.version=$env:FORGE_VERSION

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FORGE_TAG }}
          name: ${{ env.FORGE_TAG }}
          make_latest: true
          generate_release_notes: true
          files: |
            skia-ide/release/*.exe
            skia-ide/release/*.yml
            skia-ide/release/*.blockmap
