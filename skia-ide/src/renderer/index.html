<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKIA FORGE</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="app-shell">
        <aside id="sidebar" class="skia-sidebar">
            <div id="sidebar-logo-wrap">
                <img src="assets/logo.png" id="skia-sidebar-logo" alt="SKIA" />
            </div>
            <nav id="skia-nav">
                <div class="nav-item is-active" data-view="explorer">EXPLORER</div>
                <div class="nav-item" data-view="search">SEARCH</div>
                <div class="nav-item" data-view="agent">AGENT</div>
                <div class="nav-item" data-view="forge">FORGE</div>
                <div class="nav-item" data-view="settings">SETTINGS</div>
            </nav>
        </aside>

        <main id="center-panel">
            <div id="editor-container" class="center-view active"></div>

            <div id="view-search" class="center-view">
                <div class="view-header">SEARCH</div>
                <input id="search-input" type="text" placeholder="Search files and symbols..." />
                <div id="search-results"></div>
            </div>

            <div id="view-agent" class="center-view">
                <div class="view-header">AGENT</div>
                <input id="agent-task-input" type="text" placeholder="Describe a task for SKIA..." />
                <button id="agent-run-btn">RUN TASK</button>
                <div id="agent-log"></div>
            </div>

            <div id="view-forge" class="center-view">
                <div class="view-header">FORGE CONTROL PLANE</div>
                <div id="forge-mode"></div>
                <div id="forge-governance"></div>
                <div id="forge-modules"></div>
            </div>

            <div id="view-settings" class="center-view">
                <div class="view-header">SETTINGS</div>
                <label>BACKEND URL</label>
                <input id="settings-backend-url" type="text" />
                <label>AUTH TOKEN</label>
                <input id="settings-auth-token" type="text" />
                <button id="settings-save-btn">SAVE</button>
            </div>
        </main>

        <aside id="chat-panel">
            <header class="chat-header">
                <div class="chat-brand">
                    <img src="assets/sidebar-logo.png" id="chat-logo" alt="SKIA" />
                    <span>SKIA</span>
                </div>
                <button id="chat-new-btn">+ NEW CHAT</button>
            </header>

            <section id="chat-messages"></section>

            <div id="chat-controls">
                <textarea id="chat-input" placeholder="Ask SKIA anything..."></textarea>
                <div class="chat-buttons">
                    <button id="chat-clear-btn">CLEAR</button>
                    <button id="chat-cancel-btn">CANCEL</button>
                    <button id="chat-send-btn">SEND</button>
                </div>
                <div id="chat-tagline">One ecosystem. One universe. All SKIA.</div>
            </div>
        </aside>
    </div>

    <footer id="status-bar">
        <span id="status-text">⬡ SKIA: SOVEREIGN</span>
        <span id="status-architecture">ARCH: --</span>
    </footer>

    <script src="bundle.js"></script>
</body>
</html>
